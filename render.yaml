services:
  # ── MySQL Database ───────────────────────────────────────────────
  - type: pserv
    name: mysql
    env: docker
    dockerfilePath: ./mysql/Dockerfile
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_DATABASE
        value: loanguard
    # disk: 
    #   name: mysql-data
    #   mountPath: /var/lib/mysql
    #   sizeGB: 1
    # Note: Disk requires a paid plan. Commented out for free tier testing.
    # Without a persistent disk, database data clears on restart!

  # ── Python ML Microservice ───────────────────────────────────────
  - type: web
    name: ml-service
    env: docker
    dockerfilePath: ./ml-service/Dockerfile
    envVars:
      - key: PORT
        value: 8000

  # ── Java Spring Boot Backend ─────────────────────────────────────
  - type: web
    name: backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        fromService:
          type: pserv
          name: mysql
          envVarKey: RENDER_INTERNAL_URL
      # Render internal URLs format to 'mysql:3306'. We will inject the correct JDBC string format:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mysql:3306/loanguard?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        fromService:
          type: pserv
          name: mysql
          envVarKey: MYSQL_ROOT_PASSWORD
      - key: RL_SERVICE_URL
        value: http://ml-service:8000
      - key: ML_SERVICE_URL
        value: http://ml-service:8000

  # ── React Frontend ───────────────────────────────────────────────
  - type: web
    name: frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: backend
          envVarKey: RENDER_EXTERNAL_URL
